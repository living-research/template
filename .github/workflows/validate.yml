name: Validate

on:
  push:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'scripts/**'
      - 'data/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt nbconvert ipykernel

      - name: Run notebooks
        run: |
          for nb in notebooks/*.ipynb; do
            [ -f "$nb" ] || continue
            echo "→ $nb"
            jupyter nbconvert --to notebook --execute "$nb" \
              --ExecutePreprocessor.timeout=600 \
              --output /dev/null 2>&1 || echo "⚠ $nb failed (may need Colab/GPU)"
          done

      - name: Upload results
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            results/
            data/processed/
          if-no-files-found: ignore
